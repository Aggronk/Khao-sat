<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khảo sát về thực trạng lạm dụng AI của giới trẻ hiện nay</title>

<style>

.flower{
position:fixed;
pointer-events:none;
z-index:999;
animation:fall linear forwards;
}

body{
font-family:Arial;
background:linear-gradient(to bottom,#fff7cc,#ffd6e7);
min-height:100vh;
margin:0;

display:flex;
justify-content:center;
align-items:flex-start;

position:relative;
overflow-x:hidden;
padding:40px 20px;
}

.box{
background:white;
width:92%;
max-width:500px;
padding:28px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
margin:auto;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
margin-top:20px;
padding:10px 18px;
background:#4285f4;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#3367d6;
}

.scene{
perspective:1000px;

position:fixed;
top:45%;
left:50%;
transform:translate(-50%,-50%);
}

.card3d{
display:none;
width:100%;
max-width:380px;
position:relative;
transform-style:preserve-3d;
transition:transform 0.8s;
margin-top:40px;
}

.card3d.open{
transform:rotateY(180deg);
}

.front,.back{
width:100%;
height:100%;
backface-visibility:hidden;
background:white;
border-radius:15px;
padding:20px;
text-align:center;
}

.back{
transform:rotateY(180deg);
display:flex;
flex-direction:column;
align-items:center;
padding-top:70px;
position:relative;
}

img{
width:160px;
height:160px;
border-radius:10px;
object-fit:cover;
}

.name{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

#wish{
background:#fff5f8;
padding:18px;
border-radius:12px;
text-align:center;
line-height:1.6;
margin-top:12px;
font-size:16px;

max-height:160px;
overflow-y:auto;
}

.error{
margin-top:10px;
color:#888;
}

@keyframes fall{

0%{
transform:translate(0,0) rotate(0deg);
opacity:1;
}

100%{
transform:translate(100vw,100vh) rotate(720deg);
opacity:0;
}

}

.ribbon{
position:absolute;
top:-80px;
left:50%;
transform:translateX(-50%);

width:420px;
height:140px;

background:url("ribbon.png") center no-repeat;
background-size:100% 100%;

display:flex;
align-items:center;
justify-content:center;

color:#ffd700;
font-weight:bold;
font-size:22px;
text-shadow:0 2px 4px rgba(0,0,0,0.5);

animation:ribbonDrop 1s ease forwards;
}

@keyframes ribbonDrop{

0%{
top:-80px;
opacity:0;
}

100%{
top:20px;
opacity:1;
}

}

</style>
</head>

<body>

<div class="box" id="survey">

<h2>Khảo sát về thực trạng lạm dụng AI của giới trẻ hiện nay</h2>

<p>Khảo sát ẩn danh dành cho học sinh nhằm nghiên cứu mức độ sử dụng AI trong học tập.</p>

<label>ID người tham gia khảo sát</label>

<input type="text" id="code" placeholder="Nhập ID của bạn">

<button onclick="submitSurvey()">Tiếp tục</button>

<p id="error" class="error"></p>

</div>

<div class="scene">

<div class="card3d" id="card">

<div class="front">
<h2>💌 Bạn có một tấm thiệp</h2>
<button onclick="openCard()">Mở thiệp</button>
</div>

<div class="back">

<div class="ribbon">🎉 Mừng ngày 8/3 🎉</div>

<img id="photo">

<div class="name" id="name"></div>

<div id="stt"></div>

<p id="wish"></p>

</div>

</div>

</div>

function submitSurvey(){

let code=document.getElementById("code").value.trim();
let card=data[code];

if(card){

document.getElementById("survey").style.display="none";
document.getElementById("card").style.display="block";

document.getElementById("name").innerText=card.name;
document.getElementById("stt").innerText="STT: "+code;
document.getElementById("wish").innerText=card.wish;

}else{

document.getElementById("error").innerText="ID không hợp lệ.";

}

}

function startFlowers(){

const flowers=["🌸","🌺","🌷","🌼","💮"];

setInterval(()=>{

let flower=document.createElement("div");
flower.className="flower";

flower.innerText=flowers[Math.floor(Math.random()*flowers.length)];

flower.style.fontSize=(20+Math.random()*20)+"px";
flower.style.animationDuration=(5+Math.random()*3)+"s";

if(Math.random()<0.5){

flower.style.top="-30px";
flower.style.left=Math.random()*100+"vw";

}else{

flower.style.left="-30px";
flower.style.top=Math.random()*70+"vh";

}

document.body.appendChild(flower);

setTimeout(()=>{
flower.remove();
},8000);

},400);

}

function openCard(){
document.getElementById("card").classList.add("open");
startFlowers();
}

</script>
